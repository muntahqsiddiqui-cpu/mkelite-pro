               <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MK ELITE | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #cba052; --dark: #070c17; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--dark); color: #fff; padding-bottom: 100px; }
        header { padding: 20px 5%; background: rgba(7, 12, 23, 0.9); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(203, 160, 82, 0.2); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(to right, #fff, #cba052); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 5%; }
        .card { background: rgba(30, 41, 59, 0.2); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .p-details { padding: 12px; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; text-align: center; display: block; text-decoration: none; }
        .btn-wa { background: #25d366; color: white; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; margin-top: 10px; }
        .view { display: none; padding: 20px 5%; }
        .active-view { display: block; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); color: #fff; outline: none; }
        nav { position: fixed; bottom: 12px; left: 5%; width: 90%; background: #0f172a; border-radius: 20px; display: flex; justify-content: space-around; padding: 12px 0; border: 1px solid rgba(203, 160, 82, 0.2); }
        .nav-item { color: #64748b; font-size: 10px; text-align: center; flex: 1; }
        .nav-item.active { color: #cba052; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MK ELITE</div>
        <div id="uStatus" style="font-size: 11px; color: var(--primary);">Loading...</div>
    </header>

    <div id="homeView" class="view active-view">
        <div class="grid" id="pGrid"></div>
    </div>

    <div id="sellView" class="view">
        <h2>Post New Product</h2>
        <input type="text" id="n" placeholder="Name">
        <input type="number" id="p" placeholder="Price">
        <input type="text" id="w" placeholder="WhatsApp (923...)">
        <input type="file" id="i" accept="image/*">
        <button class="btn btn-primary" onclick="upload()">Publish</button>
    </div>

    <div id="profileView" class="view" style="text-align: center;">
        <div id="loginArea">
            <div style="font-size: 50px;">🔐</div>
            <button class="btn btn-primary" onclick="login()">Login with Google</button>
        </div>
        <div id="userDash" style="display:none;">
            <h3 id="uName">User</h3>
            <button class="btn" style="color: #ff4757;" onclick="logout()">Logout</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="nav('home')">🏠<br>Home</div>
        <div class="nav-item" id="sellBtn" style="display:none;" onclick="nav('sell')">➕<br>Sell</div>
        <div class="nav-item" onclick="nav('profile')">👤<br>Profile</div>
    </nav>

    <script>
        // AAPKA FIREBASE CODE (VIDEO SE LIYA GAYA)
        const firebaseConfig = {
            apiKey: "AIzaSyCOcjF4v7pyiLgC80KK9JipiXubQaaTHps",
            authDomain: "mk-elite-store.firebaseapp.com",
            projectId: "mk-elite-store",
            storageBucket: "mk-elite-store.firebasestorage.app",
            messagingSenderId: "243770418879",
            appId: "1:243770418879:web:f728dea0d3289df4bbc80a",
            databaseURL: "https://mk-elite-store-default-rtdb.firebaseio.com/" 
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('userDash').style.display = 'block';
                document.getElementById('sellBtn').style.display = 'block';
                document.getElementById('uName').innerText = user.displayName;
                document.getElementById('uStatus').innerText = "Seller Mode";
            } else {
                document.getElementById('uStatus').innerText = "Guest Mode";
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        function nav(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active-view'));
            document.getElementById(v+'View').classList.add('active-view');
        }

        function upload() {
            const n=document.getElementById('n').value, p=document.getElementById('p').value, w=document.getElementById('w').value, f=document.getElementById('i').files[0];
            if(!n || !p || !f) return alert("Fill all!");
            const r = new FileReader();
            r.onload = (e) => {
                db.ref('products').push({n, p, w, src: e.target.result});
                alert("Live!"); nav('home');
            };
            r.readAsDataURL(f);
        }

        db.ref('products').on('value', snap => {
            const data = snap.val();
            let html = '';
            for(let id in data) {
                let x = data[id];
                html += `<div class="card">
                    <img src="${x.src}">
                    <div class="p-details">
                        <div class="price">Rs. ${x.p}</div>
                        <div style="font-size:11px;color:#94a3b8">${x.n}</div>
                        <a href="https://wa.me/${x.w}" class="btn btn-wa">WhatsApp</a>
                    </div>
                </div>`;
            }
            document.getElementById('pGrid').innerHTML = html;
        });
    </script>
</body>
</html>
